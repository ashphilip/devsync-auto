name: DevSync Daily Update

on:
  schedule:
    - cron: "11 5 * * *"   # specific minute/hour required
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 23f2001235@ds.study.iitm.ac.in
        run: |
          echo "Daily update run at $(date)" >> activity_log.txt
          git config user.name "github-actions"
          git config user.email "23f2001235@ds.study.iitm.ac.in"
          git add .
          git commit -m "Automated daily repository update" || echo "No changes"
          git push
