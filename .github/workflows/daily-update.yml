name: DevSync Daily Update

on:
  schedule:
    - cron: "11 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 23f2001235@ds.study.iitm.ac.in
        run: |
          echo "Daily update $(date)" >> activity_log.txt
          git config user.name "github-actions"
          git config user.email "23f2001235@ds.study.iitm.ac.in"
          git add activity_log.txt
          git commit -m "Automated daily update"
          git push
